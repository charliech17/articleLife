<div class="manage-index-container">
  <h2 class="page-title">管理首頁 (Management Dashboard)</h2>
  
  <div class="cards-grid">
    <mat-card class="action-card mat-elevation-z3" (click)="goTo('manage-motto')">
      <mat-card-header>
        <mat-card-title>座右銘管理</mat-card-title>
        <mat-card-subtitle>Manage Mottos</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p>新增、編輯或刪除網站顯示的隨機座右銘。</p>
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-button color="primary">前往管理</button>
      </mat-card-actions>
    </mat-card>

    <mat-card class="action-card mat-elevation-z3" (click)="goTo('manage/categories')">
      <mat-card-header>
        <mat-card-title>文章分類管理</mat-card-title>
        <mat-card-subtitle>Manage Categories</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p>新增、編輯或刪除文章的分類標籤。</p>
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-button color="primary">前往管理</button>
      </mat-card-actions>
    </mat-card>

    <mat-card class="action-card mat-elevation-z3" (click)="goTo('manage/requested-topics')">
      <mat-card-header>
        <mat-card-title>AI 今日主題管理</mat-card-title>
        <mat-card-subtitle>Manage AI Requested Topics</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p>管理及設定各個 AI 文章分類的今日寫作主題。</p>
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-button color="primary">前往管理</button>
      </mat-card-actions>
    </mat-card>

    <mat-card class="action-card mat-elevation-z3" (click)="goTo('manage/wishes')">
      <mat-card-header>
        <mat-card-title>許願池管理</mat-card-title>
        <mat-card-subtitle>Manage Wishes</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p>查看訪客許願的功能需求，可依日期篩選並標記完成。</p>
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-button color="primary">前往管理</button>
      </mat-card-actions>
    </mat-card>

    <mat-card class="action-card mat-elevation-z3" (click)="goTo('manage/sponsors')">
      <mat-card-header>
        <mat-card-title>贊助訂單管理</mat-card-title>
        <mat-card-subtitle>Manage Sponsors</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p>查看贊助訂單與付款狀態，可依狀態篩選並統計已入帳總額。</p>
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-button color="primary">前往管理</button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
