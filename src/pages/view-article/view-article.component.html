<div class="cus-view-article-container text-break">
  <h1 class="cus-article-title al-break-all">{{ $$articleDetails().title }}</h1>
  
  <div class="mt-4 mb-4 cus-article-meta d-flex flex-wrap gap-3 align-items-center">
    <span class="al-meta-item">分類: {{ $$articleDetails().categories | categories }}</span>
    <span class="al-meta-item">時間: {{ $articleCreateTime() | date: 'yyyy-MM-dd HH:mm' }}</span>
    <span class="al-meta-item"><i class="bi bi-eye"></i> 瀏覽次數: {{ $$articleDetails().viewTimes }}</span>
    <button class="al-meta-item al-copy-btn" (click)="copyUrl()">
      @if (isCopied()) {
        <i class="bi bi-check2 me-1"></i> 已複製
      } @else {
        <i class="bi bi-link-45deg me-1"></i> 複製網址
      }
    </button>
    <button class="al-meta-item al-copy-btn" (click)="askAi()">
      <i class="bi bi-robot me-1"></i> AI 總結
    </button>
  </div>

  <blockquote class="mt-4 cus-article-intro">
    {{ $$articleDetails().intro }}
  </blockquote>

  <div #contentContainer class="mt-5 ck ck-content cus-article-content" [innerHTML]="$articleContent()"></div>
  
  <div class="mt-5 al-sponsor-cta text-center">
    <p class="al-sponsor-cta-text mb-2">覺得這篇文章有幫助嗎？</p>
    <button class="al-sponsor-cta-btn" (click)="goToSponsor()">
      <i class="bi bi-cup-hot-fill me-1"></i> 請我喝杯咖啡
    </button>
  </div>

  <hr class="mt-5 mb-5 cus-divider">
  
  <app-article-response
    [inputArticleListInfo]="{ articleDetails: $$articleDetails(), articleResponses: $$articleResponses() }"
    (outputAddResponse)="addResponse($event)"
  ></app-article-response>
</div>
