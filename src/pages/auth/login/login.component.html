<div class="al-auth-wrapper">
  <div class="al-auth-card">
    <h1 class="al-auth-title">會員登入</h1>
    <form>
      <div class="al-auth-form-group">
        <label for="account">帳號</label>
        <input type="text" id="account" class="al-auth-input" [formControl]="acctControl" placeholder="請輸入帳號" />
      </div>
      <div class="al-auth-form-group">
        <label for="password">密碼</label>
        <input type="password" id="password" class="al-auth-input" [formControl]="pwdControl" placeholder="請輸入密碼" />
      </div>
      <div class="al-auth-form-group">
        <label for="confirmCode" (click)="sendAuthCode($event)" style="cursor: pointer; color: #4f46e5; display: inline-block;">驗證碼 (點擊發送)</label>
        <input type="password" id="confirmCode" class="al-auth-input" [formControl]="authCodeControl" placeholder="請輸入驗證碼" />
      </div>
      <div class="al-auth-btn-group">
        <button class="al-auth-btn primary" (click)="$event.preventDefault(); handleLogin()">登入</button>
        <button class="al-auth-btn secondary" (click)="$event.preventDefault(); goForgetPassword()">忘記密碼</button>
        <button class="al-auth-btn secondary" (click)="$event.preventDefault(); goRegisterPage()">前往註冊</button>
      </div>
      <div class="al-auth-divider"><span>或</span></div>
      <div class="al-google-btn-wrap" #googleBtn></div>
    </form>
  </div>
</div>
