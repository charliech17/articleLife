<div class="h-100 d-flex flex-column justify-content-center align-items-center">
  <h1>註冊頁</h1>
  <div class="mt-6">
    <form>
      <div>
        <label class="me-3" for="account">註冊帳號</label>
        <input type="text" id="account" [formControl]="acctControl" placeholder="請輸入6~20碼英數字" />
      </div>
      <div class="mt-2">
        <label class="me-3" for="password">註冊密碼</label>
        <input type="password" id="password" [formControl]="pwdControl" placeholder="請輸入8碼~20碼密碼" />
      </div>
      <div class="mt-2">
        <label class="me-3" for="password">確認密碼</label>
        <input type="password" id="password" [formControl]="confirmPwdControl" placeholder="請再次確認密碼" />
      </div>
      <div class="mt-3">
        <button class="w-100 btn btn-primary" (click)="$event.preventDefault(); handleRegister()">註冊帳密</button>
        <button class="w-100 btn btn-primary mt-2" (click)="$event.preventDefault(); goLoginPage()">前往登入頁</button>
      </div>
    </form>
  </div>
</div>
