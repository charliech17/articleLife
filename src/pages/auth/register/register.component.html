@if (canRegister) {
  <div class="al-auth-wrapper">
    <div class="al-auth-card">
      <h1 class="al-auth-title">註冊會員</h1>
      <form>
        <div class="al-auth-form-group">
          <label for="account">註冊帳號</label>
          <input type="text" id="account" class="al-auth-input" [formControl]="acctControl" placeholder="請輸入6~20碼英數字" />
        </div>
        <div class="al-auth-form-group">
          <label for="password">註冊密碼</label>
          <input type="password" id="password" class="al-auth-input" [formControl]="pwdControl" placeholder="請輸入8碼~20碼密碼" />
        </div>
        <div class="al-auth-form-group">
          <label for="confirmPassword">確認密碼</label>
          <input type="password" id="confirmPassword" class="al-auth-input" [formControl]="confirmPwdControl" placeholder="請再次確認密碼" />
        </div>
        <div class="al-auth-btn-group">
          <button class="al-auth-btn primary" (click)="$event.preventDefault(); handleRegister()">註冊帳密</button>
          <button class="al-auth-btn secondary" (click)="$event.preventDefault(); goLoginPage()">前往登入頁</button>
        </div>
        <div class="al-auth-divider"><span>或</span></div>
        <div class="al-google-btn-wrap" #googleBtn></div>
      </form>
    </div>
  </div>
}
@else {
  <div class="al-auth-wrapper">
    <div class="al-auth-card">
      <h1 class="al-auth-title">暫停服務</h1>
      <p class="al-auth-subtitle">暫時不開放線上註冊功能</p>
      <div class="al-auth-btn-group">
        <button class="al-auth-btn primary" (click)="goLoginPage()">回登入頁</button>
      </div>
    </div>
  </div>
}
