<div class="h-100 d-flex flex-column justify-content-center align-items-center">
  <h1>忘記密碼</h1>
  <p>請輸入要重置的帳號(email)</p>
  <div class="mt-3">
    <label class="me-3 cus-w-50px" for="account">帳號</label>
    <input type="text" id="account" [formControl]="acctControl" placeholder="請輸入帳號" />
  </div>
  <button class="mt-3 al-btn-sm" (click)="confirmSendRestPassword()">確認</button>
</div>
