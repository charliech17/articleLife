<h3>文章類型</h3>
<div class="mt-2 d-flex flex-wrap gap-2">
  <button mat-raised-button (click)="toggleCategory('')">全部類型</button>
  @for (category of $$articleCategories(); track $index) {
    <button mat-raised-button (click)="toggleCategory(category.categoryId)">{{ category.categoryName }}</button>
  }
</div>
