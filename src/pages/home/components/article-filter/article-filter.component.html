<div class="al-filter-section">
  <!-- Mobile Toggle Button -->
  <button class="al-mobile-filter-toggle d-md-none" (click)="toggleFilter()">
    篩選與管理
    <span class="al-toggle-icon" [class.expanded]="isFilterExpanded()">▼</span>
  </button>

  <!-- Filter Content -->
  <div class="al-filter-content" [class.show]="isFilterExpanded()">
    <h3 class="al-filter-title">文章類型</h3>
    <div class="al-chip-group">
      <button class="al-chip" [class.active]="$$categoryId() == ''" (click)="toggleCategory('')">全部類型</button>
      @for (category of $$articleCategories(); track $index) {
      <button class="al-chip" [class.active]="$$categoryId() == category.categoryId"
        (click)="toggleCategory(category.categoryId)">{{ category.categoryName }}</button>
      }
    </div>

    @if ($isLoggedIn()) {
    <h3 class="al-filter-title mt-5">公開 / 私人文章</h3>
    <div class="al-chip-group mt-2">
      <button class="al-action-btn" (click)="toggleArticleType()">
        <span class="al-btn-text">
          切換為
          @if ($$articleTypes() !== ArticleTypePrivate) {
            私人文章
          } @else {
            公開文章
          }
        </span>
      </button>
    </div>
    }

    @if ($isAdmin()) {
    <div class="mt-5">
      <h3 class="al-filter-title">管理介面</h3>
      <button class="al-action-btn al-action-btn-admin mt-2" (click)="goAdminPage()">前往管理頁面</button>
    </div>
    }
  </div>
</div>
