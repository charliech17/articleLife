<div class="al-daily-news">
  <div class="al-news-header">
    <h3 class="al-news-title">
      <span class="al-icon">🗞️</span> 每日新聞
    </h3>
    <span class="al-news-subtitle">掌握最新趨勢與重要消息</span>
  </div>

  <div class="al-news-carousel">
    <div class="al-news-track">
      @for (news of $$newsList(); track news.id) {
        <div class="al-news-card">
          <div class="al-card-header">
            <span class="al-date">{{ news.publishedDate | date:'MM/dd' }}</span>
            <span class="al-time">{{ news.publishedDate | date:'HH:mm:ss' }}</span>
          </div>
          <div class="al-card-body">
            <h4 class="al-news-card-title">{{ news.title }}</h4>
            <p class="al-news-card-summary">{{ news.summary }}</p>
          </div>
          <div class="al-card-footer">
            <a href="#" class="al-read-more-btn" (click)="onReadMore($event, news)">
              閱讀更多 <span class="arrow">→</span>
            </a>
          </div>
        </div>
      }
    </div>
  </div>
</div>
