<div class="al-home-container">
  <div class="al-home-content">
    
    <!-- Daily News Area -->
    <app-daily-news></app-daily-news>

    @if ($$isShowPrivateArticles()) {
      <h2 class="al-page-title">私人文章列表</h2>
      <app-article-list
        [iptArticleList]="{ articleList: $$privateArticles(), articleIdMapFile: $$articleIdMapFile(), isPrivateArticle: true }"
      ></app-article-list>
    } @else {
      <h2 class="al-page-title">文章列表</h2>
      <app-article-list [iptArticleList]="{ articleList: $$allArticles(), articleIdMapFile: $$articleIdMapFile(), isPrivateArticle: false }"></app-article-list>
    }
    
    <!-- Modern Pagination -->
    <div class="al-pagination-wrapper">
      <button class="al-btn-pagination" (click)="navigatePage(-1)" [disabled]="$currentPageForDisplay() <= 1">上一頁</button>
      <div class="al-pagination-info">
        <input type="number" class="al-pagination-input" [value]="$currentPageForDisplay()" />
        <span class="al-pagination-separator"> / </span>
        <span class="al-pagination-total">{{ $totalPages() }}</span>
      </div>
      <button class="al-btn-pagination" (click)="navigatePage(1)" [disabled]="$currentPageForDisplay() >= $totalPages()">下一頁</button>
    </div>
    
    <!-- Mini Games Area (Extracted Component) -->
    <app-mini-games></app-mini-games>
  </div>
</div>

<!-- AI Chat Floating Dialog -->
<app-ai-chat></app-ai-chat>
