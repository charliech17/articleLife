<div class="al-sidebar-wrapper p-3 p-md-4 position-relative">
  <!-- Mobile Controls (Login Status & Hamburger) -->
  <div class="d-md-none position-absolute top-0 end-0 p-3 d-flex flex-column align-items-end z-3">
    <button class="btn btn-sm al-hamburger-btn border-0 shadow-sm" (click)="toggleMobileMenu()">
      <i class="bi" style="font-size: 1.25rem;" [class.bi-list]="!isMobileMenuOpen()" [class.bi-x]="isMobileMenuOpen()"></i>
    </button>
  </div>
  
  <div class="d-md-none position-absolute top-0 start-0 p-3 z-3">
    <div class="al-login-status">
      @if ($isLoggedIn()) {
        <span class="badge rounded-pill bg-primary-gradient shadow-sm px-2 py-1"><i class="bi bi-person-check-fill"></i> 已登入</span>
      } @else {
        <span class="badge rounded-pill bg-visitor shadow-sm px-2 py-1"><i class="bi bi-person-x-fill"></i> 訪客</span>
      }
    </div>
  </div>

  <div class="text-center pt-2 pt-md-0">
    <div (click)="goBackHome()" class="al-pointer-cursor al-logo-container d-inline-block">
      <app-logo></app-logo>
    </div>
    <div class="al-sidebar-subtitle mt-1 mt-md-3">
      歡迎來到Josh的文章彙整網站
    </div>
  </div>

  <div class="al-mobile-menu" [class.open]="isMobileMenuOpen()">
    <hr class="d-md-none border-secondary opacity-25 mt-3 mb-1">
    
    <div class="al-sidebar-tags mt-2 mt-md-3 d-flex justify-content-center gap-2">
      <span class="al-tag"><i class="bi bi-code-slash"></i> 技術</span>
      <span class="al-tag"><i class="bi bi-journal-text"></i> 經驗</span>
      <span class="al-tag"><i class="bi bi-emoji-smile"></i> 有趣</span>
    </div>
    <div class="mt-3 mt-md-5">
      <app-profile></app-profile>
    </div>
    <div class="mt-2 mt-md-4 d-flex flex-column gap-2">
      <button class="al-ai-btn" [class.al-ai-btn-active]="$isAiArticlesPage()" (click)="toggleAiArticlesPage()">
        <i class="bi bi-robot"></i> 
        @if ($isAiArticlesPage()) {
          返回首頁
        } @else {
          探索 AI 創作
        }
      </button>
      <button class="al-sponsor-btn" (click)="goToSponsor()">
        <i class="bi bi-cup-hot-fill"></i> 贊助支持
      </button>
      <button class="al-theme-btn" (click)="toggleTheme()">
        @if ($isDarkMode()) {
          <i class="bi bi-sun"></i> 切換為淺色模式
        } @else {
          <i class="bi bi-moon-stars"></i> 切換為深色模式
        }
      </button>
    </div>
    @if ($isHomePage()) {
      <div class="mt-3 mt-md-4">
        <app-article-filter></app-article-filter>
      </div>
    }
    <div class="d-none d-md-block mt-4 mt-md-5">
      <app-article-outline></app-article-outline>
    </div>
  </div>
</div>
