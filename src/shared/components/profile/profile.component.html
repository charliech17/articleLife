<div class="mt-3">
  <div class="cus-profile-img-container">
    @if ($userInfo().id === -1) {
      <img src="content/img/anonymous.jpg" alt="" />
    } @else {
      @if ($userProfileImage()) {
        <img [src]="$userProfileImage()" alt="" />
      } @else {
        <img src="content/img/user_man.png" alt="" />
      }
    }
  </div>
  @if ($userInfo().id === -1) {
    <h3 class="text-center mt-1">訪客</h3>
  } @else {
    <h3 class="text-center mt-1">{{ $userInfo().displayName }}</h3>
  }
  <div>
    <div class="mt-5">
      <h4 class="">{{ $$mottoText()?.motto }}</h4>
      @if ($$mottoText()?.reference) {
        <h5 class="text-end display-6">from {{ $$mottoText()?.reference }}</h5>
      }
    </div>
  </div>
  @if ($userInfo().id >= 1) {
    <button (click)="logoutUser()">登出</button>
  }
</div>
