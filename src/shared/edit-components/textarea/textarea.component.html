<app-edit-title
  [iptEditTitle]="{ title: $iptTextarea().placeholder, isHide: !textControl.value, color: $iptTextarea().titleColor }"
></app-edit-title>

<textarea
  #textarea
  [class]="$cptTextareaClass()"
  [placeholder]="$iptTextarea().placeholder"
  (input)="handleInputEvent()"
  (change)="handleChangeEvent()"
  [formControl]="textControl"
  rows="1"
></textarea>
